<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Email Verified — Routeio</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #f9fafb;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    .card {
      background: white;
      border-radius: 16px;
      padding: 40px 32px;
      max-width: 400px;
      width: 100%;
      text-align: center;
      box-shadow: 0 4px 16px rgba(0,0,0,0.08);
    }
    .icon { font-size: 64px; margin-bottom: 16px; }
    .logo { 
      font-size: 22px; 
      font-weight: 700; 
      color: #1a1a1a;
      margin-bottom: 24px;
    }
    .logo span { color: #2D9B6F; }
    h1 { 
      color: #2D9B6F; 
      font-size: 24px;
      margin-bottom: 12px; 
    }
    p { 
      color: #666; 
      font-size: 15px; 
      line-height: 1.6;
      margin-bottom: 24px;
    }
    .btn {
      display: inline-block;
      background: #2D9B6F;
      color: white;
      padding: 14px 32px;
      border-radius: 50px;
      text-decoration: none;
      font-size: 16px;
      font-weight: 600;
      margin-bottom: 16px;
    }
    .hint {
      font-size: 13px;
      color: #999;
      margin-bottom: 0;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="icon">✅</div>
    <div class="logo">Route<span>io</span></div>
    <h1>Email Verified!</h1>
    <p>Your Routeio account is now fully verified. Tap the button below to return to the app.</p>
    <a href="routeio://verified" class="btn">Open Routeio</a>
    <p class="hint">If the button doesn't work, simply close this page and reopen the app.</p>
  </div>

  <script>
    const params = new URLSearchParams(window.location.search);
    const status = params.get('status');
    
    if (status === 'invalid') {
      document.querySelector('.icon').textContent = '❌';
      document.querySelector('h1').textContent = 'Invalid Link';
      document.querySelector('h1').style.color = '#ef4444';
      document.querySelector('p').textContent = 'This verification link is invalid or has already been used.';
      document.querySelector('.btn').style.display = 'none';
    } else if (status === 'expired') {
      document.querySelector('.icon').textContent = '⏰';
      document.querySelector('h1').textContent = 'Link Expired';
      document.querySelector('h1').style.color = '#f97316';
      document.querySelector('p').textContent = 'This link has expired. Please request a new verification email from the app.';
      document.querySelector('.btn').style.display = 'none';
    } else {
      // Success — try to open app automatically
      setTimeout(() => {
        window.location.href = 'routeio://verified';
      }, 1500);
    }
  </script>
</body>
</html>
