<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Reset Password — Routeio</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #f9fafb;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    .card {
      background: white;
      border-radius: 16px;
      padding: 40px 32px;
      max-width: 400px;
      width: 100%;
      text-align: center;
      box-shadow: 0 4px 16px rgba(0,0,0,0.08);
    }
    .logo { 
      font-size: 22px; 
      font-weight: 700; 
      color: #1a1a1a;
      margin-bottom: 24px;
    }
    .logo span { color: #2D9B6F; }
    h1 { color: #1a1a1a; font-size: 22px; margin-bottom: 12px; }
    p { color: #666; font-size: 15px; line-height: 1.6; margin-bottom: 24px; }
    .btn {
      display: inline-block;
      background: #2D9B6F;
      color: white;
      padding: 14px 32px;
      border-radius: 50px;
      text-decoration: none;
      font-size: 16px;
      font-weight: 600;
      margin-bottom: 16px;
    }
    .hint { font-size: 13px; color: #999; }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo">Route<span>io</span></div>
    <h1>🔐 Reset your password</h1>
    <p>Opening the Routeio app to reset your password...</p>
    <a href="#" class="btn" id="openBtn">Open Routeio</a>
    <p class="hint">If the app doesn't open automatically, make sure Routeio is installed on your device.</p>
  </div>
  <script>
    // Extract tokens from URL and pass to app
    const hash = window.location.hash.substring(1);
    const params = new URLSearchParams(hash);
    const accessToken = params.get('access_token');
    const refreshToken = params.get('refresh_token');
    const type = params.get('type');

    if (accessToken && type === 'recovery') {
      const appUrl = `routeio://reset-password#access_token=${accessToken}&refresh_token=${refreshToken}&type=recovery`;
      document.getElementById('openBtn').href = appUrl;
      // Auto redirect after short delay
      setTimeout(() => {
        window.location.href = appUrl;
      }, 1500);
    } else {
      document.querySelector('p').textContent = 'This link is invalid or has expired. Please request a new password reset from the app.';
      document.getElementById('openBtn').style.display = 'none';
    }
  </script>
</body>
</html>
